{% extends "base.html" %}

{% block title %}Senha Redefinida - Solicita Cidadão{% endblock %}

{% block content %}
<style>
    .complete-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 250px);
        padding: 20px;
    }
    .complete-card {
        background: #ffffff;
        width: 100%;
        max-width: 500px;
        padding: 3rem 2.5rem;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        border: 1px solid #efefef;
        text-align: center;
    }
    .complete-icon {
        font-size: 3rem;
        margin-bottom: 1rem;
    }
    .complete-card h2 {
        color: #0096c7;
        margin-bottom: 1rem;
        font-size: 1.5rem;
        font-weight: 700;
    }
    .complete-card p {
        color: #666;
        font-size: 0.95rem;
        margin-bottom: 1.5rem;
    }
    .btn-login {
        display: inline-block;
        background-color: #0096c7;
        color: white;
        padding: 12px 30px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.3s;
    }
    .btn-login:hover {
        background-color: #0077b6;
    }
</style>

<div class="complete-wrapper">
    <div class="complete-card">
        <div class="complete-icon">✅</div>
        <h2>Senha Redefinida!</h2>
        <p>Sua senha foi alterada com sucesso. Agora você pode entrar com sua nova senha.</p>
        <a href="{% url 'login' %}" class="btn-login">Fazer Login</a>
    </div>
</div>
{% endblock %}
