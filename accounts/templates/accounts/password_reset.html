{% extends "base.html" %}

{% block title %}Redefinir Senha - Solicita Cidadão{% endblock %}

{% block content %}
<style>
    .reset-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 250px);
        padding: 20px;
    }
    .reset-card {
        background: #ffffff;
        width: 100%;
        max-width: 450px;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        border: 1px solid #efefef;
    }
    .reset-card h2 {
        text-align: center;
        color: #0096c7;
        margin-bottom: 0.5rem;
        font-size: 1.5rem;
        font-weight: 700;
    }
    .reset-card p {
        text-align: center;
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }
    .reset-card label {
        display: block;
        font-weight: 600;
        margin-bottom: 5px;
        font-size: 0.9rem;
        color: #555;
    }
    .reset-card input[type="email"] {
        width: 100%;
        padding: 12px;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        margin-bottom: 20px;
        box-sizing: border-box;
    }
    .reset-card input[type="email"]:focus {
        outline: none;
        border-color: #0096c7;
        box-shadow: 0 0 0 3px rgba(0,150,199,0.1);
    }
    .btn-reset {
        width: 100%;
        background-color: #0096c7;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }
    .btn-reset:hover {
        background-color: #0077b6;
    }
    .errorlist {
        color: #e63946;
        list-style: none;
        padding: 0;
        font-size: 0.8rem;
        margin-bottom: 5px;
    }
</style>

<div class="reset-wrapper">
    <div class="reset-card">
        <h2>Redefinir Senha</h2>
        <p>Digite seu e-mail cadastrado e enviaremos um link para redefinir sua senha.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Enviar Link" class="btn-reset">
        </form>
    </div>
</div>
{% endblock %}
